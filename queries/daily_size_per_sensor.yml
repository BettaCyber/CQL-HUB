# --- Query Metadata ---
# Human-readable name for the query. Will be displayed as the title.
name: Daily size per sensor

# Description of what the query does and its purpose.
description: |
  Daily size per sensor

# The author or team that created the query.
author: SAM

# The required log sources to run this query successfully in Next-Gen SIEM.
log_sources:
  - Endpoint

# Tags for filtering and categorization.
tags:
  - Hunting

# The CrowdStrike modules required to run this query.
cs_required_modules:
  - Insight

# --- Query Content ---
# The actual CrowdStrike Query Language (CQL) code.
cql: |
  ComputerName=<hostname>
  or SourceEndpointHostName=<hostname>
  or LocalAddressIP4=<x.x.x.x>
  or aid=<>
  | eval(size_bytes = length(_raw))
  | eval(size_kb = size_bytes / 1024)
  | eval(size_mb = size_bytes / 1024 / 1024)
  | table([@timestamp, ComputerName, size_bytes, size_kb, size_mb])

# Explanation of the query.
explanation: |
  Daily size per sensor = average events/sec × average event size × 86400
  Example:
  3 events/sec
  1.5 KB average parsed event
  = about 388 MB/day
