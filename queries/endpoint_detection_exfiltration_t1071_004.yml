# --- Query Metadata ---
# Human-readable name for the query. Will be displayed as the title.
name: Endpoint Detection - Exfiltration - T1071.004

# MITRE ATT&CK technique IDs
mitre_ids:
  - T1071.004

# Description of what the query does and its purpose.
description: |
  Description: Detecta Volume Anômalo de Queries DNS por Host (Possível DNS Tunneling)
  Data Source: Falcon Sensor (DnsRequest)

# The author or team that created the query.
author: Oliveira

# The required log sources to run this query successfully in Next-Gen SIEM.
log_sources:
  - Endpoint

# Tags for filtering and categorization.
tags:
  - Detection

# The CrowdStrike modules required to run this query.
cs_required_modules:
  - Insight

# --- Query Content ---
# The actual CrowdStrike Query Language (CQL) code.
cql: |
  // ----------------------------------------------------------------------
  // Rule Name: Betta - Endpoint Detection - Exfiltration - T1071.004
  // Description: Detecta Volume Anômalo de Queries DNS por Host (Possível DNS Tunneling)
  // Data Source: Falcon Sensor (DnsRequest)
  // ----------------------------------------------------------------------
  
  // 1. Filtro Base
  #event_simpleName="DnsRequest"
  
  // 2. Filtro de Ruído Inicial
  | DomainName !~ /(?i)^(wpad|isatap|teredo)\./
  | DomainName !~ /(?i)\.(corp|internal|local|lan|ad|in-addr\.arpa)$/
  
  // 3. Extração do Domínio Pai (TLD + 1)
  | regex("(?i)(?<parent_domain>[^.]+\\.(?:com\\.br|co\\.uk|gov\\.br|edu\\.br|net\\.br|org\\.br|[a-z]{2,6}))$", field=DomainName, strict=false)
  | parent_domain = *
  
  // 4. Primeiro Agrupamento (Deduplicação Nativa)
  // Agrupamos por subdomínio exato dentro da janela de 5 minutos.
  // Isso garante que cada 'DomainName' seja único e calcula quantas requisições cada um fez.
  | bucket(span=5m, field=[ComputerName, aid, parent_domain, DomainName], function=[
      count(as=reqs_por_subdominio)
  ])
  
  // 5. Segundo Agrupamento: Roll-up para o Domínio Pai
  // Agora agrupamos tudo olhando apenas para o domínio principal
  | groupBy([_bucket, ComputerName, aid, parent_domain], function=[
      sum(reqs_por_subdominio, as=queries_5min), // Soma o total de requisições
      count(as=unique_subdomains),               // Conta o número de linhas (que equivale aos subdomínios únicos)
      collect(DomainName)                        // Cria a lista de amostras, já limpa e sem repetições!
  ])
  
  // 6. Thresholds (Limiares de Anomalia)
  | queries_5min > 200 OR unique_subdomains > 10
  
  // 7. Renomeação e Formatação
  | Host := ComputerName
  | sample_queries := DomainName
  | TimeWindow := formatTime("%Y/%m/%d %H:%M:%S", field=_bucket, timezone="America/Sao_Paulo")
  
  // 8. Tabela Final
  | table([
      TimeWindow, 
      Host, 
      aid, 
      parent_domain, 
      queries_5min, 
      unique_subdomains, 
      sample_queries
  ], sortby=queries_5min, order=desc)

# Explanation of the query.
explanation: |
  Description: Detecta Volume Anômalo de Queries DNS por Host (Possível DNS Tunneling)
  Data Source: Falcon Sensor (DnsRequest)
