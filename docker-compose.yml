services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cql-hub-backend
    environment:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_OWNER: "${GITHUB_OWNER:-BettaCyber}"
      GITHUB_REPO: "${GITHUB_REPO:-CQL-HUB}"
      GITHUB_BASE_BRANCH: "${GITHUB_BASE_BRANCH:-main}"
      DATA_SOURCE: "${DATA_SOURCE:-local}"
      SYNC_FROM_GITHUB: "${SYNC_FROM_GITHUB:-false}"
      SYNC_INTERVAL_SECONDS: "${SYNC_INTERVAL_SECONDS:-3600}"
      APP_BRAND_NAME: "${APP_BRAND_NAME:-Betta_Cyber}"
      APP_COMPANY_URL: "${APP_COMPANY_URL:-https://betta.gp}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-60}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
    ports:
      - "${API_PORT:-8002}:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cql-hub-frontend
    environment:
      API_BASE_URL: "${API_BASE_URL:-/api}"
      API_PROXY_TARGET: "${API_PROXY_TARGET:-http://backend:8002}"
      GITHUB_REPO_URL: "https://github.com/${GITHUB_OWNER:-BettaCyber}/${GITHUB_REPO:-CQL-HUB}"
      COMPANY_URL: "${APP_COMPANY_URL:-https://betta.gp}"
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
